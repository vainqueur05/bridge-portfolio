<svg xmlns="http://www.w3.org/2000/svg" width="200" height="150" viewBox="0 0 200 150">
  <defs>
    <!-- Fond CRT -->
    <linearGradient id="crtBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="50%" stop-color="#0F0F0F"/>
      <stop offset="100%" stop-color="#050505"/>
    </linearGradient>
    
    <!-- Glow phosphore -->
    <filter id="phosphorGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Scanlines -->
    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="2" fill="rgba(0,0,0,0.3)"/>
      <rect y="2" width="4" height="2" fill="rgba(255,255,255,0.02)"/>
    </pattern>
    
    <!-- Grille phosphore -->
    <pattern id="phosphorDots" width="3" height="3" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="0.6" fill="rgba(0,255,65,0.04)"/>
    </pattern>

    <!-- Animation clignotement curseur -->
    <style>
      @keyframes blink {
        0%, 49% { opacity: 1; }
        50%, 100% { opacity: 0; }
      }
      @keyframes glitchShift {
        0%, 100% { transform: translate(0, 0); }
        2% { transform: translate(-2px, 1px); }
        4% { transform: translate(2px, -1px); }
        6% { transform: translate(0, 0); }
      }
      .cursor { animation: blink 0.8s step-end infinite; }
      .glitch-text { animation: glitchShift 4s infinite; }
    </style>
  </defs>

  <!-- Fond CRT -->
  <rect width="200" height="150" fill="url(#crtBg)"/>
  
  <!-- Coins arrondis du moniteur -->
  <rect x="0" y="0" width="200" height="150" rx="8" fill="none" stroke="#1A1A1A" stroke-width="4"/>
  
  <!-- Bordure intérieure (cadre écran) -->
  <rect x="6" y="6" width="188" height="138" rx="4" fill="none" stroke="#252525" stroke-width="1.5"/>
  
  <!-- Grille phosphore -->
  <rect width="200" height="150" fill="url(#phosphorDots)"/>
  
  <!-- Scanlines -->
  <rect width="200" height="150" fill="url(#scanlines)"/>

  <!-- Icône image manquante (style terminal) -->
  <g filter="url(#phosphorGlow)" opacity="0.15">
    <!-- Cadre photo -->
    <rect x="70" y="30" width="60" height="52" rx="0" fill="none" stroke="#00FF41" stroke-width="1.5"/>
    <!-- Montagne (paysage) -->
    <polyline points="72,78 90,52 108,68 128,48 128,80 72,80" fill="none" stroke="#00FF41" stroke-width="1.2"/>
    <!-- Soleil -->
    <circle cx="108" cy="48" r="6" fill="none" stroke="#00FF41" stroke-width="1"/>
    <line x1="108" y1="40" x2="108" y2="36" stroke="#00FF41" stroke-width="0.8"/>
    <line x1="108" y1="56" x2="108" y2="60" stroke="#00FF41" stroke-width="0.8"/>
    <line x1="100" y1="48" x2="96" y2="48" stroke="#00FF41" stroke-width="0.8"/>
    <line x1="116" y1="48" x2="120" y2="48" stroke="#00FF41" stroke-width="0.8"/>
  </g>

  <!-- Texte NO SIGNAL (style terminal vintage) -->
  <g filter="url(#phosphorGlow)" opacity="0.5" class="glitch-text">
    <text x="100" y="108" text-anchor="middle" fill="#00FF41" font-family="'Courier New', 'VT323', monospace" font-size="10" letter-spacing="3">NO SIGNAL</text>
  </g>

  <!-- Curseur clignotant -->
  <rect x="142" y="100" width="6" height="2" fill="#00FF41" class="cursor" opacity="0.7"/>

  <!-- Ligne de décor bas -->
  <line x1="20" y1="120" x2="180" y2="120" stroke="#00FF41" stroke-width="0.3" opacity="0.08"/>
  
  <!-- Texte READY en bas -->
  <text x="100" y="135" text-anchor="middle" fill="#00FF41" font-family="'Courier New', monospace" font-size="6" letter-spacing="4" opacity="0.15">READY</text>

  <!-- Badge arcade -->
  <g transform="translate(155, 12)">
    <rect x="0" y="0" width="32" height="14" rx="0" fill="none" stroke="#FF4500" stroke-width="0.8" opacity="0.4"/>
    <text x="16" y="10" text-anchor="middle" fill="#FF4500" font-family="'Press Start 2P', monospace" font-size="4" opacity="0.5">IMG</text>
  </g>

  <!-- Étoile décorative (coin haut gauche) -->
  <text x="14" y="18" fill="#FFD700" font-family="'Courier New', monospace" font-size="7" opacity="0.25">*</text>
</svg>