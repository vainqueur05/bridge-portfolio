<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion | Bridge Afrika Admin</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0A0A0A 0%, #1A1A1A 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .login-card {
            background: #111111;
            border: 1px solid #1F1F1F;
            border-radius: 16px;
            padding: 48px;
            width: 100%;
            max-width: 420px;
        }
        
        .glow-input:focus {
            border-color: #00FF41;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
            outline: none;
        }
    </style>
</head>
<body>
    <div class="login-card" x-data="loginForm()">
        <!-- Logo -->
        <div class="text-center mb-8">
            <h1 class="font-pixel text-2xl text-green-400 tracking-wider mb-2">
                BRIDGE<span class="text-white">AFRIKA</span>
            </h1>
            <p class="text-gray-500 text-sm">Administration</p>
        </div>
        
        <!-- Formulaire -->
        <form @submit.prevent="handleLogin">
            <!-- Email -->
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-400 mb-2">Email</label>
                <input 
                    type="email" 
                    x-model="email"
                    required
                    class="w-full bg-[#0D0D0D] border border-gray-700 rounded-lg px-4 py-3 text-white glow-input transition-all"
                    placeholder="admin@bridgeafrika.com"
                >
            </div>
            
            <!-- Mot de passe -->
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-400 mb-2">Mot de passe</label>
                <div class="relative">
                    <input 
                        :type="showPassword ? 'text' : 'password'"
                        x-model="password"
                        required
                        class="w-full bg-[#0D0D0D] border border-gray-700 rounded-lg px-4 py-3 text-white glow-input transition-all pr-12"
                        placeholder="••••••••"
                    >
                    <button 
                        type="button"
                        @click="showPassword = !showPassword"
                        class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-300"
                    >
                        <i :class="showPassword ? 'bi-eye-slash' : 'bi-eye'"></i>
                    </button>
                </div>
            </div>
            
            <!-- Erreur -->
            <div x-show="error" 
                 x-text="error"
                 class="mb-4 p-3 bg-red-900/30 border border-red-500/50 rounded-lg text-red-400 text-sm">
            </div>
            
            <!-- Submit -->
            <button 
                type="submit"
                :disabled="loading"
                class="w-full bg-green-500 hover:bg-green-400 text-black font-bold py-3 rounded-lg transition-all disabled:opacity-50"
            >
                <span x-show="!loading">Se connecter</span>
                <span x-show="loading" class="flex items-center justify-center gap-2">
                    <i class="bi bi-arrow-repeat animate-spin"></i> Connexion...
                </span>
            </button>
        </form>
        
        <!-- Retour site -->
        <div class="mt-6 text-center">
            <a href="/" class="text-sm text-gray-500 hover:text-gray-300 transition-colors">
                <i class="bi bi-arrow-left"></i> Retour au site
            </a>
        </div>
    </div>
    
    <script>
        function loginForm() {
            return {
                email: '',
                password: '',
                showPassword: false,
                loading: false,
                error: '',
                
                async handleLogin() {
                    this.loading = true;
                    this.error = '';
                    
                    try {
                        const res = await fetch('/api/v1/auth/login', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                email: this.email,
                                password: this.password
                            })
                        });
                        
                        if (res.ok) {
                            window.location.href = '/admin';
                        } else {
                            const data = await res.json();
                            this.error = data.detail || 'Erreur de connexion';
                        }
                    } catch(e) {
                        this.error = 'Erreur réseau. Vérifiez votre connexion.';
                    } finally {
                        this.loading = false;
                    }
                }
            }
        }
    </script>
</body>
</html>
