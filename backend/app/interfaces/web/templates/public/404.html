<!DOCTYPE html>
<html lang="fr" data-theme="after-midnight">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 • Page perdue dans le noir | Bridge Afrika</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'pixel': ['"Press Start 2P"', 'monospace'],
                        'retro': ['"VT323"', 'monospace'],
                        'body': ['"Inter"', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        :root {
            --bg: #0D0003;
            --text: #F5F0EB;
            --accent: #D4AF37;
            --phosphor: #00FF41;
            --arcade: #FF4500;
        }

        [data-theme="ivory-ghost"] {
            --bg: #F9F7F4;
            --text: #2C2C2C;
            --accent: #C8A96E;
            --phosphor: #1A1A1A;
            --arcade: #B80F3C;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            cursor: none;
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        /* Curseur personnalisé */
        #cursor {
            width: 30px;
            height: 30px;
            border: 2px solid var(--accent);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 10000;
            transform: translate(-50%, -50%);
            mix-blend-mode: difference;
            transition: width 0.3s ease, height 0.3s ease, background-color 0.3s ease;
            will-change: transform;
        }
        #cursor.hover {
            width: 60px;
            height: 60px;
            background-color: rgba(212, 175, 55, 0.15);
        }
        #cursor.click {
            transform: translate(-50%, -50%) scale(0.7);
        }

        /* Lampe torche */
        #torch {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 9998;
            background: radial-gradient(
                circle 150px at 50% 50%,
                transparent 0%,
                rgba(0, 0, 0, 0.88) 60%,
                rgba(0, 0, 0, 0.96) 100%
            );
            transition: background 0.08s ease-out;
        }
        #torch.illuminated {
            background: radial-gradient(
                circle 2500px at 50% 50%,
                transparent 0%,
                rgba(0, 0, 0, 0) 100%
            );
        }

        /* Contenu */
        .container-404 {
            text-align: center;
            padding: 2rem;
            position: relative;
            z-index: 9999;
        }

        /* Glitch number */
        .glitch-number {
            font-family: 'Press Start 2P', monospace;
            font-size: clamp(4rem, 15vw, 12rem);
            color: var(--phosphor);
            text-shadow:
                0 0 10px var(--phosphor),
                0 0 30px var(--phosphor),
                0 0 60px rgba(0, 255, 65, 0.2),
                4px 4px 0 var(--arcade);
            letter-spacing: 12px;
            margin-bottom: 1.5rem;
            animation: glitch 2.5s infinite;
            transition: color 0.4s ease, text-shadow 0.4s ease;
        }
        @keyframes glitch {
            0%, 100% { transform: translate(0); }
            15% { transform: translate(-4px, 4px); }
            30% { transform: translate(4px, -4px); }
            45% { transform: translate(-3px, -3px); }
            60% { transform: translate(3px, 3px); }
            75% { transform: translate(-2px, 2px); }
            90% { transform: translate(2px, -2px); }
        }

        /* Sous-titre rétro */
        .subtitle {
            font-family: 'VT323', monospace;
            font-size: clamp(1.8rem, 6vw, 3rem);
            color: var(--text);
            opacity: 0.35;
            letter-spacing: 8px;
            text-transform: uppercase;
            margin-bottom: 1.5rem;
            transition: opacity 0.3s ease;
        }

        /* Description */
        .description {
            font-family: 'Inter', sans-serif;
            font-weight: 300;
            font-size: 1.1rem;
            color: var(--text);
            opacity: 0.25;
            margin-bottom: 2.5rem;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.7;
            transition: opacity 0.3s ease;
        }

        /* Bouton principal */
        .btn-home {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: transparent;
            color: var(--text);
            font-weight: 600;
            font-size: 1rem;
            padding: 12px 32px;
            border-radius: 50px;
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            font-family: 'Inter', sans-serif;
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: none;
            letter-spacing: 0.5px;
        }
        .btn-home:hover {
            background: var(--accent);
            border-color: var(--accent);
            color: var(--bg);
            transform: scale(1.03);
            box-shadow: 0 8px 32px rgba(212, 175, 55, 0.2);
        }
        .btn-home i {
            font-size: 1.2rem;
            transition: transform 0.3s ease;
        }
        .btn-home:hover i {
            transform: translateX(-3px);
        }

        /* Lien admin discret */
        .admin-link {
            display: inline-block;
            margin-top: 2.5rem;
            font-size: 0.75rem;
            color: var(--text);
            opacity: 0.12;
            text-decoration: none;
            transition: opacity 0.3s ease;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: none;
        }
        .admin-link:hover {
            opacity: 0.35;
        }

        /* Toggle thème */
        .theme-toggle {
            position: fixed;
            top: 24px;
            right: 24px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: none;
            z-index: 10001;
            transition: all 0.3s ease;
            color: var(--text);
            opacity: 0.3;
            font-size: 1.2rem;
        }
        .theme-toggle:hover {
            opacity: 0.7;
            background: var(--accent);
            color: var(--bg);
            border-color: var(--accent);
        }
        .theme-toggle i {
            transition: transform 0.4s ease;
        }
        .theme-toggle:hover i {
            transform: rotate(30deg);
        }
    </style>
</head>
<body>

    <!-- Curseur -->
    <div id="cursor"></div>

    <!-- Lampe torche -->
    <div id="torch"></div>

    <!-- Toggle thème -->
    <button class="theme-toggle" id="themeToggle" title="Changer d'ambiance">
        <i class="bi bi-moon-stars"></i>
    </button>

    <!-- Contenu principal -->
    <div class="container-404">
        <div class="glitch-number">404</div>
        <div class="subtitle">Page perdue dans le noir</div>
        <p class="description">
            Cette page s'est éteinte. Elle a peut-être été déplacée, supprimée, ou n'a jamais existé.
            Mais ne restez pas dans l'obscurité.
        </p>
        <a href="/" class="btn-home">
            <i class="bi bi-lightbulb"></i>
            Allumer la lumière
        </a>
        <br>
        <a href="/admin/login" class="admin-link">
            <i class="bi bi-shield-lock"></i> Accès administrateur
        </a>
    </div>

    <script>
        // ── CURSEUR ──────────────────────────────────────────
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        const hoverTargets = '.btn-home, .admin-link, .theme-toggle';
        document.addEventListener('mouseover', (e) => {
            if (e.target.closest(hoverTargets)) cursor.classList.add('hover');
        });
        document.addEventListener('mouseout', (e) => {
            if (e.target.closest(hoverTargets)) cursor.classList.remove('hover');
        });
        document.addEventListener('mousedown', () => cursor.classList.add('click'));
        document.addEventListener('mouseup', () => cursor.classList.remove('click'));

        // ── LAMPE TORCHE ─────────────────────────────────────
        const torch = document.getElementById('torch');
        let illuminated = false;

        document.addEventListener('mousemove', (e) => {
            if (!illuminated) {
                torch.style.background = `
                    radial-gradient(
                        circle 150px at ${e.clientX}px ${e.clientY}px,
                        transparent 0%,
                        rgba(0,0,0,0.88) 60%,
                        rgba(0,0,0,0.96) 100%
                    )
                `;
            }
        });

        // Clic sur le bouton = illumination totale
        document.querySelector('.btn-home').addEventListener('click', function(e) {
            e.preventDefault();
            illuminated = true;
            torch.classList.add('illuminated');

            // Redirection après l'illumination
            setTimeout(() => {
                window.location.href = this.getAttribute('href');
            }, 800);
        });

        // ── THÈME TOGGLE ────────────────────────────────────
        const themeToggle = document.getElementById('themeToggle');
        const html = document.documentElement;
        const icon = themeToggle.querySelector('i');

        themeToggle.addEventListener('click', () => {
            const current = html.getAttribute('data-theme');
            const next = current === 'after-midnight' ? 'ivory-ghost' : 'after-midnight';
            html.setAttribute('data-theme', next);

            if (next === 'ivory-ghost') {
                icon.className = 'bi bi-sun';
            } else {
                icon.className = 'bi bi-moon-stars';
            }

            localStorage.setItem('theme', next);
        });

        // Charger le thème sauvegardé
        const saved = localStorage.getItem('theme');
        if (saved) {
            html.setAttribute('data-theme', saved);
            icon.className = saved === 'ivory-ghost' ? 'bi bi-sun' : 'bi bi-moon-stars';
        }
    </script>
</body>
</html>
