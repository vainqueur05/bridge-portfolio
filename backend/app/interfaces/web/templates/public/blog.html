<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog | Bridge Afrika</title>
    <meta name="description" content="Articles, tutoriels et réflexions sur le développement SaaS.">
    <meta name="theme-color" content="#0A0A0A">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        :root { --accent: #E65100; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0A0A0A;
            color: #E0E0E0;
            min-height: 100vh;
        }
        
        /* Navigation simple */
        .nav {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 100;
            background: rgba(10,10,10,0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            padding: 0 1.5rem;
        }
        .nav-inner {
            max-width: 1300px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 64px;
        }
        .nav-logo {
            font-size: 1.3rem;
            font-weight: 900;
            color: #FFF;
            text-decoration: none;
        }
        .nav-logo span { color: var(--accent); }
        .nav-links { display: flex; gap: 2rem; align-items: center; }
        .nav-links a {
            color: #999;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            transition: color 0.2s;
        }
        .nav-links a:hover { color: #FFF; }
        .nav-cta {
            background: var(--accent);
            color: #FFF !important;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: 600;
        }
        
        /* Contenu principal */
        .main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 100px 1.5rem 4rem;
        }
        .main h1 {
            font-size: 2.5rem;
            font-weight: 900;
            color: #FFF;
            text-align: center;
            margin-bottom: 0.5rem;
        }
        .main h1 span { color: var(--accent); }
        .main .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 3rem;
        }
        
        /* Grille */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 2rem;
        }
        
        /* Carte */
        .card {
            background: #111;
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 20px;
            overflow: hidden;
            text-decoration: none;
            display: block;
            transition: all 0.3s;
            color: #FFF;
        }
        .card:hover {
            transform: translateY(-6px);
            border-color: var(--accent);
            box-shadow: 0 15px 40px rgba(230,81,0,0.15);
        }
        .card-img {
            height: 180px;
            background: linear-gradient(135deg, #1A1A1A, #222);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: rgba(230,81,0,0.15);
            position: relative;
        }
        .card-badge {
            position: absolute;
            top: 1rem;
            left: 1rem;
            background: var(--accent);
            color: #FFF;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .card-featured {
            position: absolute;
            top: 1rem;
            right: 1rem;
            color: #D4AF37;
            font-size: 1.2rem;
            filter: drop-shadow(0 0 6px rgba(212,175,55,0.6));
        }
        .card-body {
            padding: 1.5rem;
        }
        .card-body h3 {
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 0.6rem;
            line-height: 1.4;
        }
        .card:hover .card-body h3 { color: var(--accent); }
        .card-body p {
            font-size: 0.88rem;
            color: #888;
            line-height: 1.6;
            margin-bottom: 1rem;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 1rem;
        }
        .card-tags span {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            color: #AAA;
        }
        .card-meta {
            display: flex;
            gap: 1.2rem;
            font-size: 0.78rem;
            color: #666;
            border-top: 1px solid rgba(255,255,255,0.04);
            padding-top: 1rem;
        }
        .card-meta i { color: var(--accent); }
        
        /* Footer */
        .footer {
            background: #0D0D0D;
            border-top: 1px solid rgba(255,255,255,0.06);
            padding: 2rem 1.5rem;
            text-align: center;
            color: #666;
            font-size: 0.85rem;
            margin-top: 3rem;
        }
        .footer a { color: #888; text-decoration: none; margin: 0 0.8rem; }
        .footer a:hover { color: var(--accent); }
        
        /* États */
        .loading, .empty {
            text-align: center;
            color: #555;
            padding: 3rem;
            grid-column: 1 / -1;
        }
        .loading i, .empty i {
            font-size: 3rem;
            display: block;
            margin-bottom: 1rem;
            opacity: 0.2;
        }
        
        @media (max-width: 768px) {
            .nav-links { display: none; }
            .main h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

<nav class="nav">
    <div class="nav-inner">
        <a href="/" class="nav-logo">Bridge<span>Afrika</span></a>
        <div class="nav-links">
            <a href="/">Accueil</a>
            <a href="/projets">Projets</a>
            <a href="/#services">Services</a>
            <a href="/blog" style="color:#FFF;">Blog</a>
            <a href="/contact" class="nav-cta">Me contacter</a>
        </div>
    </div>
</nav>

<div class="main">
    <h1>Le <span>Blog</span></h1>
    <p class="subtitle">Tutoriels, études de cas et réflexions sur le développement SaaS et l'entrepreneuriat digital en Afrique.</p>
    
    <div id="articles-container">
        <div class="loading">
            <i class="bi bi-hourglass-split"></i>
            <p>Chargement des articles...</p>
        </div>
    </div>
</div>

<footer class="footer">
    <p>
        &copy; 2026 Bridge Afrika. 
        <a href="/">Accueil</a> · 
        <a href="/projets">Projets</a> · 
        <a href="/blog">Blog</a> · 
        <a href="/contact">Contact</a>
    </p>
</footer>

<script>
// Fonction pour créer une carte article
function createCard(article) {
    const tags = (article.tags || []).slice(0, 3).map(tag => `<span>${tag}</span>`).join('');
    const date = article.date_publication 
        ? new Date(article.date_publication).toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' })
        : '';
    
    return `
        <a href="/blog/${article.slug}" class="card">
            <div class="card-img">
                <i class="bi bi-file-text"></i>
                <span class="card-badge">${article.categorie || 'Article'}</span>
                ${article.featured ? '<span class="card-featured"><i class="bi bi-star-fill"></i></span>' : ''}
            </div>
            <div class="card-body">
                <h3>${article.titre}</h3>
                <p>${article.extrait || article.contenu?.substring(0, 150) + '...' || 'Un article à découvrir.'}</p>
                ${tags ? `<div class="card-tags">${tags}</div>` : ''}
                <div class="card-meta">
                    <span><i class="bi bi-clock"></i> ${article.temps_lecture || 5} min</span>
                    ${date ? `<span><i class="bi bi-calendar"></i> ${date}</span>` : ''}
                </div>
            </div>
        </a>
    `;
}

// Charge les articles
async function loadArticles() {
    const container = document.getElementById('articles-container');
    
    try {
        const response = await fetch('/api/v1/articles?statut=publié&limit=20');
        
        if (!response.ok) throw new Error('API erreur');
        
        const data = await response.json();
        
        // Vérifie la structure de la réponse
        let articles = [];
        if (data && Array.isArray(data.items)) {
            articles = data.items;
        } else if (Array.isArray(data)) {
            articles = data;
        }
        
        if (articles.length === 0) {
            container.innerHTML = `
                <div class="empty">
                    <i class="bi bi-journal-text"></i>
                    <p>Aucun article publié pour le moment.</p>
                </div>
            `;
            return;
        }
        
        // Affiche les articles dans une grille
        container.innerHTML = `<div class="grid">${articles.map(createCard).join('')}</div>`;
        
    } catch (error) {
        console.error('Erreur:', error);
        container.innerHTML = `
            <div class="empty">
                <i class="bi bi-exclamation-triangle"></i>
                <p>Impossible de charger les articles.</p>
                <p style="font-size:0.85rem;margin-top:0.5rem;">Veuillez réessayer plus tard.</p>
            </div>
        `;
    }
}

// Lance le chargement au démarrage
loadArticles();
</script>

</body>
</html>
